services:
  whatsapp-chatbot:
    build: .
    container_name: dr-khurrum-whatsapp-chatbot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
