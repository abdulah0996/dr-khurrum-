name: Quality and secret checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run check:secrets
      - run: npm test
      - run: npm run test:coverage
      - run: npm run check:dummy-content
      - run: npm run build
      - run: docker build -t dr-khurrum-release-check .
